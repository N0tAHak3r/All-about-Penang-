            }

        <div class="qnap" id="about">
            <h1 class="text-capitalize"><br>Q&A about Penang!</h1>
            <h4 class="text-capitalize">Only about Penang pls</h4>

            <div class="card">
                <h3>Ask a Question</h3>
                <input type="text" id="username" placeholder="Your Name">
                <textarea id="questionInput" rows="3" placeholder="Type your question..."></textarea>
                <button onclick="addQuestion()">Post Question</button>

        <script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
        <script>
            let forumData = JSON.parse(localStorage.getItem("forumData")) || [];

            function saveData() {
                localStorage.setItem("forumData", JSON.stringify(forumData));
            }

            function addQuestion() {
                const username = document.getElementById("username").value.trim();
                const questionText = document.getElementById("questionInput").value.trim();

                if (!username || !questionText) {
                    alert("Please fill in all fields!");
                    return;
                }

                forumData.push({
                    id: Date.now(),
                    user: username,
                    question: questionText,
                    answers: []
                });

                document.getElementById("username").value = "";
                document.getElementById("questionInput").value = "";

                saveData();
                displayForum();
            }

            function deleteQuestion(id) {
                if (confirm("Delete this question?")) {
                    forumData = forumData.filter(q => q.id !== id);
                    saveData();
                    displayForum();
                }
            }

            function editQuestion(id) {
                const question = forumData.find(q => q.id === id);
                const newText = prompt("Edit your question:", question.question);

                if (newText && newText.trim() !== "") {
                    question.question = newText.trim();
                    saveData();
                    displayForum();
                }
            }

            function addAnswer(questionId, inputId) {
                const answerText = document.getElementById(inputId).value.trim();

                if (!answerText) {
                    alert("Answer cannot be empty!");
                    return;
                }

                const question = forumData.find(q => q.id === questionId);
                question.answers.push({
                    id: Date.now(),
                    text: answerText
                });

                saveData();
                displayForum();
            }

            function deleteAnswer(questionId, answerId) {
                const question = forumData.find(q => q.id === questionId);
                question.answers = question.answers.filter(a => a.id !== answerId);

                saveData();
                displayForum();
            }

            function editAnswer(questionId, answerId) {
                const question = forumData.find(q => q.id === questionId);
                const answer = question.answers.find(a => a.id === answerId);

                const newText = prompt("Edit your answer:", answer.text);

                if (newText && newText.trim() !== "") {
                    answer.text = newText.trim();
                    saveData();
                    displayForum();
                }
            }

            function displayForum() {
                const forumDiv = document.getElementById("forum");
                forumDiv.innerHTML = "";

                forumData.forEach(q => {
                    const card = document.createElement("div");
                    card.className = "card";

                    let answersHTML = "";

                    q.answers.forEach(a => {
                        answersHTML += `
                            <div class="answer">
                                ${a.text}
                                <br><br>
                                <button class="edit-btn" onclick="editAnswer(${q.id}, ${a.id})">&#9997; </button>
                                <button class="delete-btn" onclick="deleteAnswer(${q.id}, ${a.id})">&#128465;</button>
                            </div>
                        `;
                    });

                    card.innerHTML = `
                        <div class="question-title">${q.user} asks:</div>
                        <p>${q.question}</p>

                        <button class="edit-btn" onclick="editQuestion(${q.id})">&#9997;</button>
                        <button class="delete-btn" onclick="deleteQuestion(${q.id})">&#128465;</button>

                        <h4>Answers:</h4>
                        ${answersHTML}

                        <textarea id="answer-${q.id}" rows="2" placeholder="Write your answer..."></textarea>
                        <button onclick="addAnswer(${q.id}, 'answer-${q.id}')">Submit Answer</button>
                    `;

                    forumDiv.appendChild(card);
                });
            }

            displayForum();
        </script>
